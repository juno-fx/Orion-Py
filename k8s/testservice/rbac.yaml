apiVersion: v1
kind: ServiceAccount
metadata:
  name: orionpy-test
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orionpy-token-creator
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orionpy-token-creator-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: orionpy-test
    namespace: default
roleRef:
  kind: Role
  name: orionpy-token-creator
  apiGroup: rbac.authorization.k8s.io
