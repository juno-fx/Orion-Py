# DO NOT EDIT THIS FILE DIRECTLY!
# This is synced from the juno-fx/ci repository in the .microservice/workflows directory and should be modified there.
name: Microservice Tagged Release
on:
  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: What to bump by.
        default: patch
        options:
          - patch
          - minor
          - major
jobs:
  StableReleaseProtection:
    runs-on:
      - self-hosted
    steps:
      - name: Fail of not on main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Not on main branch, exiting..."
          exit 1
  QC:
    needs:
      - StableReleaseProtection
    uses: juno-fx/ci/.github/workflows/ms-qc.yml@main
    secrets: inherit
  Test:
    needs:
      - QC
    uses: juno-fx/ci/.github/workflows/ms-test.yml@main
    secrets: inherit
  Tag:
    needs:
      - Test
    uses: juno-fx/ci/.github/workflows/bumpversion.yml@main
    secrets: inherit
    with:
      bump: ${{ inputs.bump }}
